<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stocks Monitor Alert</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 24px; margin: 0;">
  <h1 style="color: #333; font-size: 20px; margin-bottom: 4px;">Stocks Monitor Alert</h1>
  <p style="color: #666; font-size: 14px; margin-bottom: 24px;">Stock prices as of {{TIMESTAMP}}</p>
  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: separate; border-spacing: 12px;">
    <tbody>
      {{STOCK_TILES}}
    </tbody>
  </table>
</body>
</html>
